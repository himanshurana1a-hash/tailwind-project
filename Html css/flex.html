    <title>Flex</title>
    <style>
        .container {
            border: 2px solid red;
            display: flex;
            height: 50vh;
            /* justify-content: center; */
            align-items: center;
            /* flex-direction: row; */
            flex-wrap: wrap;
            align-content: flex-start;
            /* column-gap: 20px;

            background-color: blueviolet;

        .order-1 {

        }

        .item1 {

        }
    </style>
</head>
