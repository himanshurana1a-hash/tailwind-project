<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f6d8c9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-box {
            background: whitesmoke;
            width: 1000px;
            padding: 50px;
            box-shadow: rgb(173, 141, 146) 2px 2px 3px 3px;
        
        }

        .content {
            display: flex;
            justify-content: space-between;
            gap: 50px;
        }

        /* LEFT SIDE */
        .left {
            width: 45%;
        }

        .left p {
            margin-bottom: 20px;
        }
        .icons{
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: row;
            gap: 5px;
            
            
        }

        /* RIGHT SIDE */
        .form-section {
            width: 55%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .name-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        input,
        textarea {
            padding: 8px;
            border: 1px solid #aaa;
            outline: none;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            background: #8b4a2f;
            color: white;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            align-self: flex-end;
        }
    </style>
</head>

<body>

    <div class="main-box">

        <div style="text-align: center; margin-bottom: 30px;">

        <div class="content">

                <p style="color:#8b4a2f;">I'd like to hear from you!</p>

                <p style="  margin-bottom: 20px;">
                    If you have any inquiries or just want to say hi,
                    please use the contact form.
                </p>

            <!-- RIGHT SIDE-->
            <form class="form-section">

                <div class="name-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName">
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email address*</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message"></textarea>
                </div>

                <button type="submit">Send</button>

            </form>

        </div>
    </div>
