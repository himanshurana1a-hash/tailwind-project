<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <style>
        .header{
            border: 3px solid black;
            background-color: rgb(178, 172, 172);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            width: 100%;
            height: auto;
           
        }
        .menu{
            
            list-style: none;
            font-size: larger;
            display: flex;
            gap: 40px;
        }
        .Login{
            padding: 8px 18px;
            margin:auto;
            border: 1px solid black;
            color:white;
            text-decoration: none;
            border-radius: 2px;
            font-size: 16px;
            background-color: blue;
        }
        .signup{
            padding: 8px 18px;
            margin-left: auto;
            border: 1px solid black;
            background-color: red;
            color: rgb(244, 240, 240);
            text-decoration: none;
            border-radius: 20px;
            font-size: 16px;
            
        }
        .buttons{
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<header class="header">
   <div style="justify-content: space-around; width: 10px;"> <img src="https://static.vecteezy.com/system/resources/thumbnails/020/402/234/small/library-book-reading-abstract-icon-or-emblem-vector.jpg " width="150px" alt="logo">

</div>


    <ul class="menu">
        <li style="padding: 40px;font-size: 20px;">Home</li>
        <li style="padding: 40px;font-size: 20px;">Books</li>
        <li style="padding: 40px;font-size: 20px;">About</li>
        <li style="padding: 40px;font-size: 20px;">Contact</li>
    </ul>

    <div class="buttons">
        <a href="#" class="Login">Login</a>
        <a href="#" class="signup">Sign up</a>
    </div>
    </header>

</body>
</html>
