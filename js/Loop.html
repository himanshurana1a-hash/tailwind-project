<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // print  number 1 to 10 using for loop
        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }
        // print table of 5 using for loop
        let num = 5;
        for (let i = 1; i <= 10; i++) {
            console.log(i * num);
        }

        // factorial of 5
        let a = 5;
        let fact = 1;
        for (let i = 1; i <= a; i++) {
            fact = fact * i;
        }
        console.log(fact);

        // reverse string
        let str = "hello"
        let rev = "";

        for (let i = str.length - 1; i >= 0; i--) {
            rev += str[i];
        }
        console.log(rev);

        // Count Vowels in String 
        let str1 = "javascript";
        let count = 0;

        for (let i = 0; i < str1.length; i++) {
            if ("aeiou".includes(str1[i])) {
                count++;
            }
        }
        console.log("Vowels :", count);

        // sum of two array
        let arr = [10, 20, 30, 40, 50];
        let sum = 0;

        for (let i = 0; i < arr.length; i++) {
            sum += arr[i]
        }
        console.log("Sum :", sum);

        // Swap two number

        let p = 3;
        let q = 10;

        let temp = p;   // store p in temp
        p = q;          // assign q to p
        q = temp;       // assign temp (old p) to q

        console.log("p:", p);
        console.log("q:", q);



    </script>
</head>

<body>
    <h1>LOOP </h1>
</body>

</html>
